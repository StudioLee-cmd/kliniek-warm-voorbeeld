<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZorgPunt Voorbeeld — Pagina Niet Gevonden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="brand-name">ZorgPunt Voorbeeld</a>
      <a href="index.html" style="font-family:var(--font-ui);font-size:var(--fs-button);text-transform:uppercase;letter-spacing:var(--ls-uppercase);color:var(--color-text);text-decoration:none;">Home</a>
    </div>
  </header>

  <div class="page-404">
    <div class="page-404__code">404</div>
    <h1>Oeps! Verdwaald.</h1>
    <p>Het lijkt erop dat je verdwaald bent... Maar geen zorgen, hier is een spelletje om de tijd te doden!</p>

    <div style="display:flex;gap:var(--sp-6);justify-content:center;margin-bottom:var(--sp-4);font-family:var(--font-ui);font-size:var(--fs-button);text-transform:uppercase;letter-spacing:var(--ls-uppercase);">
      <span>Score: <strong style="color:var(--color-mid-green);" id="score">0</strong></span>
      <span>Levens: <strong style="color:var(--color-mid-green);" id="lives">3</strong></span>
    </div>

    <canvas id="gameCanvas" width="600" height="450" style="display:block;margin:0 auto var(--sp-5);border-radius:var(--radius-lg);max-width:100%;cursor:pointer;"></canvas>

    <p style="font-size:var(--fs-small);opacity:0.5;margin-bottom:var(--sp-6);text-align:center;">Gebruik je muis of vinger om de paddle te bewegen. Breek alle blokken!</p>
    <a href="index.html" class="btn btn--primary" style="margin-bottom:var(--sp-4);">&larr; Terug naar home</a>
  </div>

  <script>
  (function(){const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');const scoreEl=document.getElementById('score');const livesEl=document.getElementById('lives');function resizeCanvas(){const maxW=Math.min(600,window.innerWidth-40);const ratio=600/450;canvas.style.width=maxW+'px';canvas.style.height=(maxW/ratio)+'px'}resizeCanvas();window.addEventListener('resize',resizeCanvas);const colors={bg:'#F6F1E5',paddle:'#24332E',ball:'#24332E',text:'#24332E',dim:'rgba(36,51,46,0.3)',bricks:['#374840','#97ABAF','#D0DADC','#374840','#97ABAF']};let score=0;let lives=3;let gameRunning=true;let gameWon=false;const ball={x:300,y:400,dx:4,dy:-4,radius:8,speed:5};const paddle={width:90,height:14,x:255,y:430};const brickConfig={rows:5,cols:8,width:62,height:20,padding:8,offsetTop:50,offsetLeft:19};let bricks=[];function initBricks(){bricks=[];for(let r=0;r<brickConfig.rows;r++){bricks[r]=[];for(let c=0;c<brickConfig.cols;c++){bricks[r][c]={x:brickConfig.offsetLeft+c*(brickConfig.width+brickConfig.padding),y:brickConfig.offsetTop+r*(brickConfig.height+brickConfig.padding),alive:true,color:colors.bricks[r%colors.bricks.length]}}}}initBricks();let mouseX=paddle.x+paddle.width/2;canvas.addEventListener('mousemove',function(e){const rect=canvas.getBoundingClientRect();const scaleX=canvas.width/rect.width;mouseX=(e.clientX-rect.left)*scaleX});canvas.addEventListener('touchmove',function(e){e.preventDefault();const rect=canvas.getBoundingClientRect();const scaleX=canvas.width/rect.width;mouseX=(e.touches[0].clientX-rect.left)*scaleX},{passive:false});canvas.addEventListener('click',function(){if(!gameRunning)resetGame()});function resetGame(){score=0;lives=3;gameRunning=true;gameWon=false;ball.x=300;ball.y=400;ball.dx=4;ball.dy=-4;initBricks();updateUI()}function updateUI(){scoreEl.textContent=score;livesEl.textContent=lives}function drawBall(){ctx.beginPath();ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);ctx.fillStyle=colors.ball;ctx.fill();ctx.closePath()}function drawPaddle(){ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.width,paddle.height,4);ctx.fillStyle=colors.paddle;ctx.fill();ctx.closePath()}function drawBricks(){for(let r=0;r<brickConfig.rows;r++){for(let c=0;c<brickConfig.cols;c++){const b=bricks[r][c];if(!b.alive)continue;ctx.beginPath();ctx.roundRect(b.x,b.y,brickConfig.width,brickConfig.height,3);ctx.fillStyle=b.color;ctx.fill();ctx.closePath()}}}function drawMessage(line1,line2){ctx.fillStyle=colors.text;ctx.font='500 48px "DM Sans",sans-serif';ctx.textAlign='center';ctx.fillText(line1,300,210);ctx.font='400 16px "Lora",serif';ctx.fillStyle=colors.dim;ctx.fillText(line2,300,250)}function collisionDetection(){for(let r=0;r<brickConfig.rows;r++){for(let c=0;c<brickConfig.cols;c++){const b=bricks[r][c];if(!b.alive)continue;if(ball.x>b.x&&ball.x<b.x+brickConfig.width&&ball.y>b.y&&ball.y<b.y+brickConfig.height){ball.dy=-ball.dy;b.alive=false;score+=10;updateUI();const totalBricks=brickConfig.rows*brickConfig.cols;if(score/10>=totalBricks){gameWon=true;gameRunning=false}}}}}function gameLoop(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle=colors.bg;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(36,51,46,0.08)';ctx.lineWidth=1;ctx.strokeRect(0.5,0.5,canvas.width-1,canvas.height-1);if(!gameRunning){drawBricks();drawPaddle();if(gameWon)drawMessage('GEWONNEN!','Klik om opnieuw te spelen');else drawMessage('GAME OVER','Klik om opnieuw te spelen');requestAnimationFrame(gameLoop);return}paddle.x=mouseX-paddle.width/2;paddle.x=Math.max(0,Math.min(canvas.width-paddle.width,paddle.x));ball.x+=ball.dx;ball.y+=ball.dy;if(ball.x+ball.radius>canvas.width||ball.x-ball.radius<0)ball.dx=-ball.dx;if(ball.y-ball.radius<0)ball.dy=-ball.dy;if(ball.y+ball.radius>paddle.y&&ball.y+ball.radius<paddle.y+paddle.height+5&&ball.x>paddle.x&&ball.x<paddle.x+paddle.width){const hitPos=(ball.x-paddle.x)/paddle.width;const angle=(hitPos-0.5)*Math.PI*0.7;ball.dx=ball.speed*Math.sin(angle);ball.dy=-ball.speed*Math.cos(angle)}if(ball.y+ball.radius>canvas.height){lives--;updateUI();if(lives<=0)gameRunning=false;else{ball.x=paddle.x+paddle.width/2;ball.y=paddle.y-20;ball.dx=4*(Math.random()>0.5?1:-1);ball.dy=-4}}collisionDetection();drawBricks();drawBall();drawPaddle();ctx.font='500 14px "DM Sans",sans-serif';ctx.fillStyle=colors.dim;ctx.textAlign='left';ctx.fillText('SCORE: '+score,10,25);ctx.textAlign='right';ctx.fillText('LEVENS: '+lives,590,25);requestAnimationFrame(gameLoop)}gameLoop()})();
  </script>
</body>
</html>
